name: DCO

# Verifies that every commit in a pull request carries a valid Signed-off-by
# trailer (Developer Certificate of Origin). This repo follows the same DCO +
# CLA policy as the main MiBee Steward repository — see
# https://github.com/Mi-Bee-Studio/MiBeeSteward/blob/main/.github/DCO.md
# and https://github.com/Mi-Bee-Studio/MiBeeSteward/blob/main/CLA.md

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: DCO check
    runs-on: ubuntu-latest
    steps:
      - name: Check out head and base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on all PR commits
        uses: christophebedard/dco-check@0.5.1
        with:
          args: --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
