# TCP banner greeting fingerprints.
#
# Matches evidence with Kind="banner", RawData["banner"]=<greeting line>.
# Consumed by the RuleClassifier. Each rule emits one ServiceIdentity per
# matching banner evidence piece.
#
# IMPORTANT match semantics (must mirror the original Go classifiers exactly):
#   - BannerClassifier + HTTPClassifier use hasPrefix(): the banner is NOT
#     trimmed, and the prefix match is CASE-INSENSITIVE (both sides uppercased).
#   - MailClassifier uses strings.TrimSpace() first, then a CASE-SENSITIVE
#     prefix test + CASE-INSENSITIVE contains. So mail rules set trim: true
#     and op: prefix (CS) with an op: contains_any (CI) inside a compound.
#
# Confidence model: each rule's `confidence` is the BASE confidence; at runtime
# it is fused with the evidence's own confidence via the Bayesian complement
# formula  confidence = 1 - Π(1-c_i).  See docs/fingerprint-spec.md §Confidence.

version: 1

rules:
  # ── BannerClassifier (classify/banner.go) ──────────────────────────────
  # SSH greeting: "SSH-2.0-OpenSSH_9.0". Extracts the software token after
  # the second "-" as the version (matches extractSSHVersion's SplitN(b,"-",3)[2]).
  - id: banner-ssh
    source: builtin
    match:
      kind: banner
      field: banner
      op: prefix_ci
      value: "SSH-"
    service: ssh
    protocol: tcp
    confidence: 0.95
    extract:
      metadata:
        banner: { passthrough: banner }
        version: { split: { delim: "-", index: 2 } }
        # OS from the SSH banner suffix. Distributions embed their build tag
        # after the OpenSSH version: "OpenSSH_9.0p2 Debian-7+deb13u4",
        # "OpenSSH_for_Windows_9.5", "OpenSSH_8.4p1 Ubuntu-5ubuntu1.1",
        # "OpenSSH_7.9p1 Raspbian-10+deb10u2". The keyword_map reads the full
        # banner (CI) and emits a normalized OS label. SSHHandler propagates
        # this os_type to the device record.
        os_type:
          keyword_map:
            field: banner
            ci: true
            entries:
              - { contains: "for_windows", set: "Windows" }
              - { contains: "debian", set: "Debian" }
              - { contains: "ubuntu", set: "Ubuntu" }
              - { contains: "raspbian", set: "Raspbian" }
              - { contains: "freebsd", set: "FreeBSD" }
              - { contains: "centos", set: "CentOS" }
              - { contains: "rhel", set: "RHEL" }
              - { contains: "fedora", set: "Fedora" }
              - { contains: "alpine", set: "Alpine" }
              - { contains: "arch", set: "Arch" }
              - { contains: "opensuse", set: "openSUSE" }
              - { contains: "amazon", set: "Amazon Linux" }
              - { contains: "oracle", set: "Oracle Linux" }

  - id: banner-http
    source: builtin
    match:
      kind: banner
      field: banner
      op: prefix_ci
      value: "HTTP/"
    service: http
    protocol: tcp
    confidence: 0.8
    extract:
      metadata:
        banner: { passthrough: banner }

  - id: banner-rtsp
    source: builtin
    match:
      kind: banner
      field: banner
      op: prefix_ci
      value: "RTSP/"
    service: rtsp
    protocol: tcp
    confidence: 0.95
    extract:
      metadata:
        banner: { passthrough: banner }

  # FTP: BannerClassifier matches FTP OR "220 " (case-insensitive prefix of
  # either). Note this overlaps the SMTP rule below, which is why mail requires
  # an additional ESMTP/MTA marker (see banner-smtp).
  - id: banner-ftp
    source: builtin
    match:
      kind: banner
      field: banner
      op: prefix_ci
      value: ["FTP", "220 "]
    service: ftp
    protocol: tcp
    confidence: 0.7
    extract:
      metadata:
        banner: { passthrough: banner }

  # ── HTTPClassifier (classify/rtsp_camera.go) ───────────────────────────
  # Re-asserts http at a LOWER confidence (0.75) than banner-http (0.8). Both
  # fire on the same evidence — overlapping rules are allowed; the orchestrator
  # dedups by service+port downstream. Mirrors the original dual-emit behavior.
  - id: banner-http-lowconf
    source: builtin
    match:
      kind: banner
      field: banner
      op: prefix_ci
      value: "HTTP/"
    service: http
    protocol: tcp
    confidence: 0.75
    extract:
      metadata:
        banner: { passthrough: banner }

  # ── MailClassifier (classify/mail_remote.go) ───────────────────────────
  # All mail rules TRIM the banner first, then use CASE-SENSITIVE prefix +
  # CASE-INSENSITIVE contains. The compound AND expresses "prefix AND (marker
  # OR port)". These run with first-match-wins ordering per banner; place SMTP
  # before POP3/IMAP. Note b is trimmed for mail rules but NOT for the banner/*
  # rules above — the original code trims only inside MailClassifier.

  # SMTP: "220 " prefix (CS) AND (ESMTP/Postfix/Sendmail/Exim/mail contains, CI).
  # The "mail" contains is broad by design — mirrors the original heuristic.
  - id: banner-smtp
    source: builtin
    match:
      kind: banner
      field: banner
      trim: true
      op: compound
      and:
        - { op: prefix, value: "220 " }
        - op: contains_any
          ci: true
          value: ["esmtp", "postfix", "sendmail", "exim", "mail"]
    service: smtp
    protocol: tcp
    confidence: 0.9
    priority: 30
    exclusive_group: mail   # first-match-wins per banner (original uses `continue`)
    extract:
      metadata:
        banner: { passthrough: banner }

  # POP3: "+OK" prefix (CS) AND (pop3 contains CI OR port==110).
  - id: banner-pop3
    source: builtin
    match:
      kind: banner
      field: banner
      trim: true
      op: compound
      and:
        - { op: prefix, value: "+OK" }
        - op: or
          any:
            - { op: contains, value: "pop3", ci: true }
            - { op: port_eq, value: 110 }
    service: pop3
    protocol: tcp
    confidence: 0.9
    priority: 20
    exclusive_group: mail
    extract:
      metadata:
        banner: { passthrough: banner }

  # IMAP: "* OK" prefix (CS) AND (imap contains CI OR port==143).
  - id: banner-imap
    source: builtin
    match:
      kind: banner
      field: banner
      trim: true
      op: compound
      and:
        - { op: prefix, value: "* OK" }
        - op: or
          any:
            - { op: contains, value: "imap", ci: true }
            - { op: port_eq, value: 143 }
    service: imap
    protocol: tcp
    confidence: 0.9
    priority: 10
    exclusive_group: mail
    extract:
      metadata:
        banner: { passthrough: banner }
